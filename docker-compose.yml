version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: superliving_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: superliving
      POSTGRES_PASSWORD: superliving_dev
      POSTGRES_DB: superliving
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: superliving_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data: